source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/rules.conf


monitor = , highres, auto, 1


exec-once = sunsetr
exec-once = hyprlock
exec-once = hypridle
exec-once = waybar
exec-once = dunst
exec-once = mpd-mpris
exec-once = wl-paste --watch cliphist store

exec-once = [workspace 1] ghostty
exec-once = [workspace 2 silent] firefox


env = XCURSOR_SIZE, 24
env = XCURSOR_THEME,Bibata-Modern-Ice


general {
    gaps_in = 6
    gaps_out = 12

    border_size = 2
    col.inactive_border = $smol
    col.active_border = $meh

    resize_on_border = true
    allow_tearing = false
    layout = scrolling

    snap {
        enabled = true
        respect_gaps = true
    }
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        color = rgba(14141480)
        offset = 12, 12
        range = 1
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes, please :)

    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = easeOutExpo, 0.1, 1.0, 0.1, 1.0
    bezier = easeOutCustom, 0.1, 1.125, 0.1, 1.0

    animation = global, 1, 3.5, easeOutExpo

    animation = windows, 1, 3.0, easeOutCustom
    animation = windowsOut, 1, 12.0, linear

    animation = layers, 0
    animation = layersOut, 1, 12.0, linear, popin

    animation = fade, 1, 3.5, easeOutExpo
    animation = fadeLayersIn, 0

    animation = border, 0
    animation = workspaces, 0
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    focus_on_activate = true
    background_color = $deep
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

input {
    kb_layout = us
    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0.2 # -1.0 - 1.0
    accel_profile = custom 1 0.0 1.1 2.4 6.5
    # TODO: scroll accel

    repeat_delay = 200
    repeat_rate = 36
}

cursor {
    no_hardware_cursors = true
    inactive_timeout = 1
}

ecosystem {
    no_donation_nag = true
}
